<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FedEx MID Generator</title>
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="stylesheet" href="../css/fedex.css" />
  </head>
  <body>
    <nav class="tabs">
      <a class="tab" href="indexing.html">Indexing</a>
      <a class="tab" href="../index.html">Comment Generator</a>
    </nav>

    <div class="layout">
      <div class="card">
        <div class="card-header">
          <h3>MID Generator</h3>
        </div>
        <div class="form-group">
          <label>Country Code</label>
          <input id="country" type="text" placeholder="US, GB, CN..." maxlength="2" />
        </div>
        <div class="form-group">
          <label>Manufacturer Name</label>
          <input id="manufacturer" type="text" placeholder="e.g., SHEN LITU Co., LTD." />
        </div>
        <div class="form-group">
          <label>Address</label>
          <input id="address" type="text" placeholder="e.g., 11455 Main Street" />
        </div>
        <div class="form-group">
          <label>City</label>
          <input id="city" type="text" placeholder="e.g., Shanghai" />
        </div>
        <div class="button-group">
          <button id="generate" class="btn btn-primary">Generate</button>
          <button id="clearBtn" class="btn btn-secondary">Clear</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Result</h3>
        </div>
        <div id="resultBox" class="result-box">
          Fill the form to generate the MID code.
        </div>
        <button id="copyBtn" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Copy Code</button>
      </div>
    </div>

    <script src="../js/fedex.js"></script>
  </body>
</html>
